<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>메모</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111110;--surface:#1c1c1a;--surface2:#252522;--surface3:#2e2e2b;
  --border:#2e2e2a;--border2:#3e3e38;
  --text:#e8e8e0;--text2:#8a8a80;--text3:#5a5a54;
  --green:#2db87e;--green-bg:#0d2b1e;
  --blue:#5a9ae0;--blue-bg:#0d1e38;
  --amber:#d4a030;--amber-bg:#2b1e08;
  --red:#e05a4a;
  --accent:#7a9ee8;
  --radius:10px;--radius-sm:6px;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}

.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100}
.header-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:50px;gap:8px}
.app-title{font-size:15px;font-weight:600;color:var(--text);flex-shrink:0}
.header-right{display:flex;align-items:center;gap:6px}
.sync-dot{font-size:10px;color:var(--green)}
.sync-text{font-size:11px;color:var(--text3)}
.qnow-badge{font-family:'Courier New',monospace;font-size:11px;color:var(--text3);flex-shrink:0}
.icon-btn{background:none;border:none;color:var(--text3);font-size:17px;cursor:pointer;padding:4px 6px;border-radius:var(--radius-sm)}
.icon-btn:hover{color:var(--text);background:var(--surface2)}

.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px}
.tab-inner{max-width:680px;margin:0 auto;display:flex}
.tab-btn{padding:10px 14px;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}

.page{display:none;max-width:680px;margin:0 auto;padding:16px}
.page.active{display:block}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}

.qcode-stamp{font-family:'Courier New',monospace;font-size:13px;color:var(--accent);margin-bottom:8px;letter-spacing:.04em}
.memo-textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:15px;font-family:inherit;line-height:1.7;padding:12px;resize:vertical;min-height:100px;outline:none}
.memo-textarea:focus{border-color:var(--accent)}

.special-chars{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.sc-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:16px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sc-btn:hover{background:var(--surface3)}

/* 첨부 파일 */
.attach-bar{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.attach-btn{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:13px;padding:8px 12px;cursor:pointer}
.attach-btn:hover{background:var(--surface3);color:var(--text)}
.attach-btn input{display:none}

.preview-area{display:flex;flex-direction:column;gap:8px;margin:8px 0}
.preview-item{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px;display:flex;align-items:center;gap:10px}
.preview-img{width:60px;height:60px;object-fit:cover;border-radius:4px;flex-shrink:0}
.preview-audio-icon{font-size:28px;flex-shrink:0}
.preview-info{flex:1;min-width:0}
.preview-name{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-size{font-size:11px;color:var(--text3)}
.preview-remove{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;flex-shrink:0;padding:4px}
.preview-remove:hover{color:var(--red)}

/* 업로드 진행 */
.upload-progress{font-size:12px;color:var(--amber);margin:6px 0}

.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn{border:none;border-radius:var(--radius-sm);padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-accent{background:var(--accent);color:#111}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border2)}

/* 메모 엔트리 */
.memo-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.memo-entry:hover{border-color:var(--border2)}
.memo-qcode{font-family:'Courier New',monospace;font-size:12px;color:var(--accent);margin-bottom:6px}
.memo-qcode-label{font-size:11px;color:var(--text3);margin-left:8px}
.memo-body{font-size:14px;color:var(--text);white-space:pre-wrap;word-break:break-word;line-height:1.75}

/* 첨부 표시 */
.attach-display{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.attach-img{max-width:100%;border-radius:var(--radius-sm);display:block;cursor:pointer}
.attach-audio{width:100%;margin-top:2px}
.attach-caption{font-size:12px;color:var(--text3);margin-top:4px}

.attach-pdf{margin-top:4px}
.attach-pdf-link{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);text-decoration:none;color:var(--text);font-size:13px;transition:background .15s}
.attach-pdf-link:hover{background:var(--surface3);border-color:var(--accent)}
.attach-pdf-icon{font-size:18px;flex-shrink:0}
.attach-pdf-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px}

.memo-actions{display:flex;gap:6px;margin-top:10px}
.memo-act-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text3);font-size:12px;padding:4px 10px;cursor:pointer}
.memo-act-btn:hover{color:var(--text);border-color:var(--border2)}
.memo-act-btn.del{color:var(--red)}
.edit-textarea{min-height:80px;margin-top:4px;font-size:14px}

/* 이미지 라이트박스 */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:4px}
.lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer}

.week-section{margin-bottom:20px}
.week-header{font-size:13px;font-weight:600;color:var(--text2);padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.week-header:hover{color:var(--text)}
.week-label{color:var(--accent)}
.week-count{font-size:11px;color:var(--text3);font-weight:400}
.week-body{display:block}
.week-body.collapsed{display:none}

.week-list-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.week-list-item:hover{border-color:var(--border2);background:var(--surface2)}
.week-list-label{font-size:14px;font-weight:600;color:var(--text)}
.week-list-meta{font-size:12px;color:var(--text3)}
.week-list-arrow{color:var(--text3);font-size:14px}

.search-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:14px;padding:10px 14px;outline:none;margin-bottom:12px}
.search-input:focus{border-color:var(--accent)}
.search-result-label{font-size:12px;color:var(--text3);margin-bottom:10px}
mark{background:var(--amber-bg);color:var(--amber);border-radius:2px;padding:0 2px}

.back-btn{display:flex;align-items:center;gap:6px;color:var(--accent);font-size:13px;cursor:pointer;margin-bottom:14px;background:none;border:none;padding:0}
.back-btn:hover{opacity:.8}

.empty{text-align:center;padding:48px 16px;color:var(--text3);font-size:13px}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;max-width:400px;width:100%}
.modal-title{font-size:16px;font-weight:600;margin-bottom:8px}
.modal-desc{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.modal-label{font-size:12px;color:var(--text2);font-weight:500;display:block;margin-bottom:4px}
.modal-input{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:14px;margin-bottom:8px;outline:none}
.modal-input:focus{border-color:var(--accent)}
.modal-hint{font-size:11px;color:var(--text3);margin-bottom:16px;line-height:1.6}
.modal-err{display:none;font-size:12px;color:var(--red);margin-top:8px}

@media(max-width:480px){
  .tab-btn{padding:10px 10px;font-size:12px}
  .page{padding:12px}
}
</style>
</head>
<body>

<!-- 설정 모달 -->
<div id="setup-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">🔑 GitHub 연동 설정</div>
    <div class="modal-desc">Personal Access Token을 입력하면 <code>ledger</code> 저장소에 자동으로 연결됩니다. 토큰은 이 기기에만 저장됩니다.</div>
    <label class="modal-label">Personal Access Token</label>
    <input id="setup-token" class="modal-input" type="password" placeholder="github_pat_...">
    <div class="modal-hint">발급: GitHub → Settings → Developer settings → Fine-grained tokens<br>→ <b>ledger</b> 저장소 선택 → Contents: Read and write</div>
    <button id="setup-save-btn" class="btn btn-accent" style="width:100%;height:40px" onclick="saveSetup()">시작하기</button>
    <div id="setup-error" class="modal-err"></div>
  </div>
</div>

<!-- 이미지 라이트박스 -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- 헤더 -->
<div class="app-header">
  <div class="header-inner">
    <span class="app-title">메모</span>
    <div class="header-right">
      <span id="sync-dot" class="sync-dot">●</span>
      <span id="sync-text" class="sync-text"></span>
      <span id="qnow" class="qnow-badge"></span>
      <a href="index.html" style="text-decoration:none">
        <button class="icon-btn" title="가계부로">💰</button>
      </a>
      <button class="icon-btn" title="설정" onclick="openSetup()">⚙️</button>
    </div>
  </div>
</div>

<!-- 탭 -->
<div class="tab-bar">
  <div class="tab-inner">
    <button class="tab-btn active" onclick="showTab('write')">✏️ 작성</button>
    <button class="tab-btn" onclick="showTab('timeline')">📋 타임라인</button>
    <button class="tab-btn" onclick="showTab('weeks')">📅 주차</button>
    <button class="tab-btn" onclick="showTab('search')">🔍 검색</button>
  </div>
</div>

<!-- 작성 탭 -->
<div id="tab-write" class="page active">
  <div class="card">
    <div class="card-title">새 메모</div>
    <div id="write-qcode" class="qcode-stamp">—</div>
    <div class="special-chars">
      <button class="sc-btn" onclick="insertChar('✶')">✶</button>
      <button class="sc-btn" onclick="insertChar('✦')">✦</button>
      <button class="sc-btn" onclick="insertChar('✧')">✧</button>
      <button class="sc-btn" onclick="insertChar('✬')">✬</button>
      <button class="sc-btn" onclick="insertChar('⛧')">⛧</button>
    </div>
    <textarea id="memo-input" class="memo-textarea" placeholder="메모를 입력하세요..."></textarea>

    <!-- 첨부 버튼 -->
    <div class="attach-bar">
      <label class="attach-btn">
        📷 이미지
        <input type="file" accept="image/*" multiple onchange="addFiles(this.files,'image')">
      </label>
      <label class="attach-btn">
        🎵 오디오
        <input type="file" accept="audio/*" multiple onchange="addFiles(this.files,'audio')">
      </label>
      <label class="attach-btn">
        📄 PDF
        <input type="file" accept="application/pdf" multiple onchange="addFiles(this.files,'pdf')">
      </label>
    </div>

    <!-- 첨부 미리보기 -->
    <div id="preview-area" class="preview-area"></div>
    <div id="upload-progress" class="upload-progress" style="display:none"></div>

    <div class="btn-row">
      <button id="save-btn" class="btn btn-accent" onclick="saveMemo()">저장</button>
      <button class="btn btn-ghost" onclick="clearWrite()">지우기</button>
    </div>
  </div>

  <div id="recent-section">
    <div class="card-title" style="padding:4px 0 8px;color:var(--text3);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase">최근 메모</div>
    <div id="recent-list"></div>
  </div>
</div>

<!-- 타임라인 탭 -->
<div id="tab-timeline" class="page">
  <div id="timeline-content"></div>
</div>

<!-- 주차 탭 -->
<div id="tab-weeks" class="page">
  <div id="weeks-content"></div>
</div>

<!-- 검색 탭 -->
<div id="tab-search" class="page">
  <input id="search-input" class="search-input" type="text" placeholder="검색어 입력..." oninput="doSearch()">
  <div id="search-result-label" class="search-result-label"></div>
  <div id="search-results"></div>
</div>

<script>
// ── Qcode ──
function getFirstSunday(y){
  const j=new Date(y,0,1);const d=j.getDay();
  const s=new Date(j);s.setDate(j.getDate()-(d===0?0:d));return s;
}
function getWeekNum(d){
  const fs=getFirstSunday(d.getFullYear());
  return Math.floor((d-fs)/86400000/7)+1;
}
function buildQcode(d){
  const yy=String(d.getFullYear()).slice(-2);
  const ww=String(getWeekNum(d)).padStart(2,'0');
  const dow=d.getDay();
  const hh=String(d.getHours()).padStart(2,'0');
  const t=Math.floor(d.getMinutes()/10);
  return `${yy}w${ww}${dow}v${hh}${t}`;
}
function qcodeLabel(qc){
  const days=['일','월','화','수','목','금','토'];
  const m=qc.match(/^(\d{2})w(\d{2})(\d)v(\d{2})(\d)$/);
  if(!m)return qc;
  const[,yy,ww,d,hh,t]=m;
  return `20${yy}년 ${+ww}주차 ${days[+d]}요일 ${hh}:${t}0`;
}
function weekKey(qc){const m=qc.match(/^(\d{2}w\d{2})/);return m?m[1]:'';}
function weekLabel(wk){
  const m=wk.match(/^(\d{2})w(\d{2})$/);
  if(!m)return wk;
  return `20${m[1]}년 ${+m[2]}주차`;
}

// ── GitHub ──
const GH_REPO_NAME='ledger';
const GH_FILE='memo.nfo';
const GH_RAW_DIR='raw';

function getToken(){return localStorage.getItem('gh_token')||'';}
function getOwner(){return localStorage.getItem('gh_owner')||'';}
function ghApiUrl(){
  const o=getOwner();if(!o)return null;
  return `https://api.github.com/repos/${o}/${GH_REPO_NAME}/contents/${GH_FILE}`;
}
function ghRawApiUrl(filename){
  const o=getOwner();if(!o)return null;
  return `https://api.github.com/repos/${o}/${GH_REPO_NAME}/contents/${GH_RAW_DIR}/${filename}`;
}
function rawPublicUrl(filename){
  return `https://raw.githubusercontent.com/${getOwner()}/${GH_REPO_NAME}/main/${GH_RAW_DIR}/${filename}`;
}

let ghSha=null;

function setSyncIndicator(state,text){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  if(dot)dot.style.color=state==='ok'?'var(--green)':state==='syncing'?'var(--amber)':state==='error'?'var(--red)':'var(--text3)';
  if(txt)txt.textContent=text;
}

// ── 설정 모달 ──
function openSetup(){
  const m=document.getElementById('setup-modal');
  m.style.display='flex';m.style.alignItems='center';m.style.justifyContent='center';
  const t=getToken();if(t)document.getElementById('setup-token').value=t;
  document.getElementById('setup-error').style.display='none';
}
function closeSetup(){document.getElementById('setup-modal').style.display='none';}

async function saveSetup(){
  const token=document.getElementById('setup-token').value.trim();
  const errEl=document.getElementById('setup-error');
  const btn=document.getElementById('setup-save-btn');
  if(!token){errEl.textContent='토큰을 입력하세요.';errEl.style.display='block';return;}
  btn.disabled=true;btn.textContent='확인 중...';errEl.style.display='none';
  try{
    const userRes=await fetch('https://api.github.com/user',{
      headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}
    });
    if(!userRes.ok)throw new Error(`토큰 인증 실패 (${userRes.status})`);
    const user=await userRes.json();
    const owner=user.login;
    const repoRes=await fetch(`https://api.github.com/repos/${owner}/${GH_REPO_NAME}`,{
      headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}
    });
    if(repoRes.status===404)throw new Error(`저장소 '${GH_REPO_NAME}'를 찾을 수 없습니다.`);
    if(!repoRes.ok)throw new Error(`저장소 접근 실패 (${repoRes.status})`);
    localStorage.setItem('gh_token',token);
    localStorage.setItem('gh_owner',owner);
    ghSha=null;closeSetup();
    await loadMemos({silent:false});
  }catch(e){
    errEl.textContent=e.message;errEl.style.display='block';
  }finally{
    btn.disabled=false;btn.textContent='시작하기';
  }
}

// ── 데이터 ──
let memos=[];

async function loadMemos({silent=false}={}){
  const token=getToken();const url=ghApiUrl();
  if(!token||!url){if(!silent)openSetup();return;}
  if(!silent)setSyncIndicator('syncing','불러오는 중...');
  try{
    const res=await fetch(url,{headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}});
    if(res.status===404){memos=[];ghSha=null;setSyncIndicator('ok','새 파일');renderAll();return;}
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    ghSha=data.sha;
    const decoded=decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
    memos=JSON.parse(decoded);
    setSyncIndicator('ok',`불러옴 ${new Date().toLocaleTimeString()}`);
    renderAll();
  }catch(e){
    setSyncIndicator('error','불러오기 실패');
    if(!silent)alert(`불러오기 실패\n${e.message}`);
  }
}

async function saveMemos(){
  const token=getToken();const url=ghApiUrl();
  if(!token||!url){openSetup();return;}
  setSyncIndicator('syncing','저장 중...');
  try{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(memos))));
    if(!ghSha){
      const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}});
      if(r.ok){const d=await r.json();ghSha=d.sha;}
    }
    const body={message:`memo sync ${buildQcode(new Date())}`,content};
    if(ghSha)body.sha=ghSha;
    const res=await fetch(url,{method:'PUT',
      headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(res.status===409||res.status===422){
      const r2=await fetch(url,{headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}});
      if(r2.ok){const d2=await r2.json();ghSha=d2.sha;}
      body.sha=ghSha;
      const res2=await fetch(url,{method:'PUT',
        headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
      if(!res2.ok)throw new Error(`HTTP ${res2.status}`);
      const j2=await res2.json();ghSha=j2.content.sha;
    } else {
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const j=await res.json();ghSha=j.content.sha;
    }
    setSyncIndicator('ok',`저장됨 ${new Date().toLocaleTimeString()}`);
  }catch(e){
    setSyncIndicator('error','저장 실패');
    alert(`저장 실패\n${e.message}`);
  }
}

// ── 파일 업로드 ──
// 첨부 대기 목록: [{file, type, previewUrl}]
let pendingAttachments=[];

function addFiles(files,type){
  for(const file of files){
    const url=URL.createObjectURL(file);
    pendingAttachments.push({file,type,previewUrl:url});
  }
  renderPreview();
}

function renderPreview(){
  const area=document.getElementById('preview-area');
  if(!pendingAttachments.length){area.innerHTML='';return;}
  area.innerHTML=pendingAttachments.map((a,i)=>{
    const name=a.file.name;
    const size=(a.file.size/1024).toFixed(0)+'KB';
    if(a.type==='image'){
      return `<div class="preview-item">
        <img class="preview-img" src="${a.previewUrl}" alt="">
        <div class="preview-info"><div class="preview-name">${escHtml(name)}</div><div class="preview-size">${size}</div></div>
        <button class="preview-remove" onclick="removeAttach(${i})">✕</button>
      </div>`;
    } else if(a.type==='pdf'){
      return `<div class="preview-item">
        <span class="preview-audio-icon">📄</span>
        <div class="preview-info"><div class="preview-name">${escHtml(name)}</div><div class="preview-size">${size}</div></div>
        <button class="preview-remove" onclick="removeAttach(${i})">✕</button>
      </div>`;
    } else {
      return `<div class="preview-item">
        <span class="preview-audio-icon">🎵</span>
        <div class="preview-info"><div class="preview-name">${escHtml(name)}</div><div class="preview-size">${size}</div></div>
        <button class="preview-remove" onclick="removeAttach(${i})">✕</button>
      </div>`;
    }
  }).join('');
}

function removeAttach(i){
  if(pendingAttachments[i].previewUrl)URL.revokeObjectURL(pendingAttachments[i].previewUrl);
  pendingAttachments.splice(i,1);
  renderPreview();
}

// 이미지를 JPEG 91품질로 변환 후 base64 반환
function imageToJpegBase64(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      canvas.width=img.naturalWidth;
      canvas.height=img.naturalHeight;
      const ctx=canvas.getContext('2d');
      // JPEG는 투명 미지원 → 흰 배경
      ctx.fillStyle='#ffffff';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob=>{
        if(!blob){rej(new Error('JPEG 변환 실패'));return;}
        const r=new FileReader();
        r.onload=()=>res(r.result.split(',')[1]);
        r.onerror=rej;
        r.readAsDataURL(blob);
      },'image/jpeg',0.91);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error('이미지 로드 실패'));};
    img.src=url;
  });
}

// 일반 파일을 base64로 읽기
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

// 파일 확장자 추출
function fileExt(filename){
  const m=filename.match(/\.([^.]+)$/);
  return m?m[1].toLowerCase():'bin';
}

// raw/ 폴더에서 qc로 시작하는 기존 파일명 목록 취득
async function fetchExistingRawFiles(qc){
  const token=getToken();
  const o=getOwner();
  if(!token||!o)return new Set();
  try{
    const res=await fetch(
      `https://api.github.com/repos/${o}/${GH_REPO_NAME}/contents/${GH_RAW_DIR}`,
      {headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}}
    );
    if(!res.ok)return new Set();
    const list=await res.json();
    return new Set(list.map(f=>f.name).filter(n=>n.startsWith(qc)));
  }catch{return new Set();}
}

// qc + 기존파일셋 기준으로 다음 빈 번호(_01~_99) 파일명 결정
function resolveFilename(qc,ext,existingNames,localUsed){
  for(let n=1;n<=99;n++){
    const candidate=`${qc}_${String(n).padStart(2,'0')}.${ext}`;
    if(!existingNames.has(candidate)&&!localUsed.has(candidate)){
      localUsed.add(candidate);
      return candidate;
    }
  }
  throw new Error('파일 번호가 99를 초과합니다.');
}

// GitHub에 파일 업로드 → 파일명 반환
async function uploadFile(file,filename,isImage=false){
  const token=getToken();
  const url=ghRawApiUrl(filename);
  const b64=isImage?await imageToJpegBase64(file):await fileToBase64(file);
  const body={message:`raw ${filename}`,content:b64};
  const res=await fetch(url,{method:'PUT',
    headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||res.status);}
  return filename;
}

// ── UI ──
let currentTab='write';
let weekDetailKey=null;

function showTab(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['write','timeline','weeks','search'][i]===name);
  });
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  currentTab=name;weekDetailKey=null;
  if(name==='timeline')renderTimeline();
  if(name==='weeks')renderWeeks();
  if(name==='search')doSearch();
}

function updateQnow(){
  const el=document.getElementById('qnow');
  const wq=document.getElementById('write-qcode');
  const qc=buildQcode(new Date());
  if(el)el.textContent=qc;
  // 입력 중이 아닐 때만 갱신
  if(wq&&!document.getElementById('memo-input').value&&!pendingAttachments.length)wq.textContent=qc;
}

function insertChar(ch){
  const ta=document.getElementById('memo-input');
  const s=ta.selectionStart,e=ta.selectionEnd;
  ta.value=ta.value.slice(0,s)+ch+ta.value.slice(e);
  ta.selectionStart=ta.selectionEnd=s+ch.length;ta.focus();
}

function clearWrite(){
  document.getElementById('memo-input').value='';
  pendingAttachments.forEach(a=>URL.revokeObjectURL(a.previewUrl));
  pendingAttachments=[];
  renderPreview();
  document.getElementById('write-qcode').textContent=buildQcode(new Date());
  document.getElementById('upload-progress').style.display='none';
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function highlightText(text,keyword){
  if(!keyword)return escHtml(text);
  const re=new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return escHtml(text).replace(re,m=>`<mark>${m}</mark>`);
}

// 첨부 파일 표시 HTML
function attachHtml(attachments){
  if(!attachments||!attachments.length)return '';
  return '<div class="attach-display">'+attachments.map(a=>{
    const url=rawPublicUrl(a.filename);
    if(a.type==='image'){
      return `<img class="attach-img" src="${url}" alt="${escHtml(a.filename)}" onclick="openLightbox('${url}')">`;
    } else if(a.type==='pdf'){
      const displayName=a.origName||a.filename;
      return `<div class="attach-pdf">
        <a class="attach-pdf-link" href="#" onclick="openPdf('${escHtml(a.filename)}');return false;">
          <span class="attach-pdf-icon">📄</span><span class="attach-pdf-name">${escHtml(displayName)}</span>
        </a>
      </div>`;
    } else {
      return `<audio class="attach-audio" controls src="${url}"></audio>
        <div class="attach-caption">🎵 ${escHtml(a.filename)}</div>`;
    }
  }).join('')+'</div>';
}

function memoEntryHtml(memo,keyword=''){
  const label=qcodeLabel(memo.qc);
  const body=keyword?highlightText(memo.body,keyword):escHtml(memo.body);
  return `<div class="memo-entry" id="entry-${memo.id}">
    <div class="memo-qcode">${escHtml(memo.qc)}<span class="memo-qcode-label">${escHtml(label)}</span></div>
    <div class="memo-body-wrap" id="body-wrap-${memo.id}">
      ${memo.body?`<div class="memo-body">${body}</div>`:''}
    </div>
    ${attachHtml(memo.attachments)}
    <div class="memo-actions">
      <button class="memo-act-btn" onclick="startEdit(${memo.id})">수정</button>
      <button class="memo-act-btn del" onclick="deleteMemo(${memo.id})">삭제</button>
    </div>
  </div>`;
}

function startEdit(id){
  const memo=memos.find(m=>m.id===id);
  if(!memo)return;
  const wrap=document.getElementById(`body-wrap-${id}`);
  if(!wrap)return;
  // 이미 편집 중이면 무시
  if(wrap.querySelector('textarea'))return;
  wrap.innerHTML=`<textarea class="memo-textarea edit-textarea" id="edit-ta-${id}">${escHtml(memo.body||'')}</textarea>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-accent" style="padding:7px 14px;font-size:13px" onclick="commitEdit(${id})">저장</button>
      <button class="btn btn-ghost" style="padding:7px 14px;font-size:13px" onclick="cancelEdit(${id})">취소</button>
    </div>`;
  const ta=document.getElementById(`edit-ta-${id}`);
  if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}
}

function cancelEdit(id){
  const memo=memos.find(m=>m.id===id);
  if(!memo)return;
  const wrap=document.getElementById(`body-wrap-${id}`);
  if(!wrap)return;
  wrap.innerHTML=memo.body?`<div class="memo-body">${escHtml(memo.body)}</div>`:'';
}

async function commitEdit(id){
  const ta=document.getElementById(`edit-ta-${id}`);
  if(!ta)return;
  const newBody=ta.value.trim();
  const memo=memos.find(m=>m.id===id);
  if(!memo)return;
  memo.body=newBody;
  renderAll();
  await saveMemos();
}

// PDF blob 뷰어
async function openPdf(filename){
  try{
    const tab=window.open('','_blank');
    const token=getToken();
    const o=getOwner();
    const headers={Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'};
    const contentsUrl=`https://api.github.com/repos/${o}/${GH_REPO_NAME}/contents/${GH_RAW_DIR}/${filename}`;
    const res=await fetch(contentsUrl,{headers});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    let b64;
    if(data.content&&data.content.trim()){
      // 1MB 이하: Contents API에서 바로 사용
      b64=data.content.replace(/\n/g,'');
    } else {
      // 1MB 초과: Blobs API로 fallback
      const blobRes=await fetch(
        `https://api.github.com/repos/${o}/${GH_REPO_NAME}/git/blobs/${data.sha}`,
        {headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github.raw+json'}}
      );
      if(!blobRes.ok)throw new Error(`Blob HTTP ${blobRes.status}`);
      const blobData=await blobRes.json();
      b64=blobData.content.replace(/\n/g,'');
    }
    const binary=atob(b64);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    const blob=new Blob([bytes],{type:'application/pdf'});
    tab.location.href=URL.createObjectURL(blob);
  }catch(e){
    alert(`PDF 열기 실패: ${e.message}`);
  }
}

// 라이트박스
function openLightbox(url){
  document.getElementById('lightbox-img').src=url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src='';
}

// 렌더링
function renderRecent(){
  const el=document.getElementById('recent-list');
  const recent=memos.slice(0,5);
  if(!recent.length){el.innerHTML='<div class="empty">작성된 메모가 없습니다.</div>';return;}
  el.innerHTML=recent.map(m=>memoEntryHtml(m)).join('');
}

function renderTimeline(){
  const el=document.getElementById('timeline-content');
  if(!memos.length){el.innerHTML='<div class="empty">작성된 메모가 없습니다.</div>';return;}
  const groups=groupByWeek(memos);
  let html='';
  for(const [wk,items] of groups){
    html+=`<div class="week-section">
      <div class="week-header" onclick="toggleWeek('${wk}')">
        <span><span class="week-label">${weekLabel(wk)}</span></span>
        <span class="week-count">${items.length}개 ▾</span>
      </div>
      <div class="week-body" id="wb-${wk}">
        ${items.map(m=>memoEntryHtml(m)).join('')}
      </div>
    </div>`;
  }
  el.innerHTML=html;
}

function toggleWeek(wk){
  const el=document.getElementById(`wb-${wk}`);
  if(!el)return;
  el.classList.toggle('collapsed');
}

function renderWeeks(){
  const el=document.getElementById('weeks-content');
  if(weekDetailKey){renderWeekDetail(weekDetailKey);return;}
  if(!memos.length){el.innerHTML='<div class="empty">작성된 메모가 없습니다.</div>';return;}
  const groups=groupByWeek(memos);
  let html='';
  for(const [wk,items] of groups){
    html+=`<div class="week-list-item" onclick="openWeekDetail('${wk}')">
      <div>
        <div class="week-list-label">${weekLabel(wk)}</div>
        <div class="week-list-meta">${items.length}개 메모</div>
      </div>
      <span class="week-list-arrow">›</span>
    </div>`;
  }
  el.innerHTML=html;
}

function openWeekDetail(wk){weekDetailKey=wk;renderWeekDetail(wk);}

function renderWeekDetail(wk){
  const el=document.getElementById('weeks-content');
  const items=memos.filter(m=>weekKey(m.qc)===wk);
  let html=`<button class="back-btn" onclick="backToWeeks()">← 주차 목록</button>
    <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px">${weekLabel(wk)}<span style="font-size:12px;color:var(--text3);font-weight:400;margin-left:8px">${items.length}개</span></div>`;
  html+=items.length?items.map(m=>memoEntryHtml(m)).join(''):'<div class="empty">메모가 없습니다.</div>';
  el.innerHTML=html;
}

function backToWeeks(){weekDetailKey=null;renderWeeks();}

function doSearch(){
  const kw=document.getElementById('search-input').value.trim();
  const labelEl=document.getElementById('search-result-label');
  const resEl=document.getElementById('search-results');
  if(!kw){labelEl.textContent='';resEl.innerHTML='';return;}
  const hits=memos.filter(m=>(m.body&&m.body.includes(kw))||m.qc.includes(kw));
  labelEl.textContent=`${hits.length}개 결과`;
  resEl.innerHTML=hits.length?hits.map(m=>memoEntryHtml(m,kw)).join(''):'<div class="empty">결과 없음</div>';
}

function groupByWeek(list){
  const map=new Map();
  for(const m of list){
    const wk=weekKey(m.qc);
    if(!map.has(wk))map.set(wk,[]);
    map.get(wk).push(m);
  }
  return map;
}

function renderAll(){
  renderRecent();
  if(currentTab==='timeline')renderTimeline();
  if(currentTab==='weeks')renderWeeks();
  if(currentTab==='search')doSearch();
}

// ── 메모 저장/삭제 ──
async function saveMemo(){
  const body=document.getElementById('memo-input').value.trim();
  if(!body&&!pendingAttachments.length)return;

  const btn=document.getElementById('save-btn');
  const prog=document.getElementById('upload-progress');
  btn.disabled=true;

  const qc=buildQcode(new Date());
  let attachments=[];

  // 첨부 파일 업로드
  if(pendingAttachments.length){
    prog.style.display='block';
    prog.textContent='기존 파일 확인 중...';
    // raw/ 폴더에서 같은 큐코드로 시작하는 기존 파일 목록 취득
    const existingNames=await fetchExistingRawFiles(qc);
    const localUsed=new Set(); // 이번 업로드 세션 내 중복 방지
    for(let i=0;i<pendingAttachments.length;i++){
      const a=pendingAttachments[i];
      try{
        const ext=a.type==='image'?'jpg':fileExt(a.file.name);
        const filename=resolveFilename(qc,ext,existingNames,localUsed);
        prog.textContent=`업로드 중 (${i+1}/${pendingAttachments.length}) ${filename}`;
        await uploadFile(a.file,filename,a.type==='image');
        attachments.push({type:a.type,filename,origName:a.type==='pdf'?a.file.name:undefined});
      }catch(e){
        prog.style.display='none';btn.disabled=false;
        alert(`파일 업로드 실패: ${e.message}`);return;
      }
    }
    prog.style.display='none';
  }

  const memo={id:Date.now(),qc,body,attachments};
  memos.unshift(memo);
  clearWrite();
  renderAll();
  btn.disabled=false;
  await saveMemos();
}

async function deleteMemo(id){
  if(!confirm('이 메모를 삭제합니까?\n(첨부 파일은 raw 폴더에 남습니다)'))return;
  memos=memos.filter(m=>m.id!==id);
  renderAll();
  await saveMemos();
}
